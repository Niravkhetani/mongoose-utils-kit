name: Test & Publish to npm

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Run tests on every push to main
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────
  # Job 2: Publish to npm (only on GitHub Release)
  # ─────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test                      # only runs if test job passes
    if: github.event_name == 'release' && github.event.action == 'published'

    permissions:
      contents: read
      id-token: write                # required for OIDC Trusted Publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (final gate before publish)
        run: npm test

      - name: Build
        run: npm run build

      - name: Sync version from GitHub Release tag
        # Strips the leading 'v' from the tag (e.g. v1.2.0 → 1.2.0)
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm via Trusted Publishing (OIDC)
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN needed — npm exchanges the GitHub OIDC token automatically
